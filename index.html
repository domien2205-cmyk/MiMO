<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizPDF - Generatore di Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col items-center">

  <div class="max-w-xl w-full">
    <h1 class="text-4xl font-bold text-center py-8">📚 QuizPDF</h1>

    <!-- Home State -->
    <div id="home">
      <div class="bg-slate-900 rounded-3xl p-10 text-center border border-slate-800">
        <p class="text-xl mb-8">Carica un PDF e genera un quiz automatico</p>
        <label class="block border-2 border-dashed border-slate-600 hover:border-blue-500 rounded-3xl p-12 cursor-pointer transition">
          <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
          <span class="text-5xl block mb-4">📄</span>
          <span class="text-lg font-medium">Seleziona file PDF</span>
        </label>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading" class="hidden text-center py-20">
      <div class="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
      <p class="mt-6 text-xl" id="status">Analisi in corso...</p>
    </div>

    <!-- Quiz State -->
    <div id="quizContainer" class="hidden bg-slate-900 rounded-3xl p-8 border border-slate-800 shadow-2xl">
      <div id="quizContent"></div>
      <button onclick="location.reload()" class="mt-8 w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition">Nuovo Quiz</button>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.js';

    document.getElementById('pdfInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('home').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');

      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      
      let fullText = '';
      for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) { // Legge fino a 5 pagine
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + ' ';
      }

      generateQuiz(fullText);
    });

    function generateQuiz(text) {
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
      const quizContainer = document.getElementById('quizContent');
      
      let html = '<h2 class="text-2xl font-bold mb-6">Quiz Generato</h2>';
      
      // Logica semplificata: prende frasi casuali e le trasforma in domande
      const sample = sentences.sort(() => 0.5 - Math.random()).slice(0, 3);
      
      sample.forEach((sentence, index) => {
        html += `
          <div class="mb-8">
            <p class="text-lg font-semibold mb-3">${index + 1}. ${sentence.trim()}</p>
            <div class="space-y-2">
              <button class="w-full text-left p-3 bg-slate-800 hover:bg-blue-600 rounded-lg transition" onclick="this.style.backgroundColor='#2563eb'">Vero</button>
              <button class="w-full text-left p-3 bg-slate-800 hover:bg-blue-600 rounded-lg transition" onclick="this.style.backgroundColor='#2563eb'">Falso</button>
            </div>
          </div>
        `;
      });

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      quizContainer.innerHTML = html;
    }
  </script>
</body>
</html>
